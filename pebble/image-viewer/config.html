<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Viewer</title>
  <style>
    body { font-family: sans-serif; padding: 16px; background: #1a1a1a; color: #eee; margin: 0; }
    h2 { margin-top: 0; }
    p { font-size: 14px; color: #aaa; }
    textarea {
      width: 100%; padding: 10px; box-sizing: border-box;
      background: #333; color: #eee; border: 1px solid #555;
      border-radius: 4px; font-size: 13px; height: 120px; resize: vertical;
    }
    button { margin-top: 10px; padding: 12px; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; width: 100%; }
    button.send { background: #5b8bf5; }
    button.danger { background: #c0392b; margin-top: 24px; }
    #status { margin-top: 10px; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <h2>Image Viewer</h2>
  <p>Paste a Base64-encoded image below (with or without the data:image/... prefix) and tap Send.</p>
  <textarea id="b64" placeholder="data:image/png;base64,iVBORw0KGgo..."></textarea>
  <button class="send" onclick="send()">Send to Watch</button>
  <button class="danger" onclick="clear()">Clear (restore default)</button>
  <div id="status"></div>
  <script>
    function status(m) { document.getElementById('status').textContent = m; }
    function send() {
      var val = document.getElementById('b64').value.trim();
      if (!val) { status('Please paste a Base64 string.'); return; }
      if (val.indexOf('data:') !== 0) val = 'data:image/png;base64,' + val;
      status('Sending...');
      window.location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify({ imageUrl: val }));
    }
    function clear() {
      window.location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify({ clear: true }));
    }
  </script>
</body>
</html>
