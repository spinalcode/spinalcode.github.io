<!DOCTYPE html>
<html>
<head>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap');

        @font-face {
            font-family: 'CurrysSans'; /*a name to be used later*/
            src: url('Currys Sans.ttf'); /*URL to font*/
        }

        :root {
            --navy: #16233A;
            --purple: #4C12A1;
            --purple-dark: #39007A;
            --purple-light: #EFE7FF;
            --lavender: #D9CEFB;
            --pink: #E5006D;
            --pink-dark: #C40060;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
        }

        body {
            align-items: flex-start;
            justify-content: center;
            background: linear-gradient(160deg, #E9E1FC 0%, #D3C3F7 45%, #E9E1FC 100%);
            position: relative;
            display: flex;
            margin: 0;
            min-height: 100vh;
            padding: 40px 16px;
            font-family: 'CurrysSans', 'Nunito', 'Baloo 2', sans-serif;
            overflow-x: hidden;
        }

        .container1 {
            position: relative;
            border: 3px solid var(--navy);
            text-align: center;
            background-color: var(--white);
            border-radius: 24px;
            padding: 36px 32px 40px;
            margin-top: 30px;
            max-width: 780px;
            width: 100%;
            z-index: 2;
            box-shadow: 0 24px 50px rgba(22, 35, 58, 0.22);
        }

        .h1-container {
            margin-top: 0;
            margin-bottom: 22px;
        }

        .container1 h1 {
            display: inline-block;
            border: none;
            padding: 0 0 14px 0;
            text-align: center;
            background-color: transparent;
            color: var(--purple);
            font-family: 'Baloo 2', 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 34px;
            position: relative;
            margin: 0;
        }

        .container1 h1::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 4px;
            border-radius: 4px;
            background-color: var(--pink);
        }

        .container1 p {
            color: #2c2c3a;
            font-size: 16px;
            font-weight: 600;
        }

        .circle {
            border-radius: 50%;
            position: absolute;
            background: linear-gradient(to bottom, #F5F0FF, #D9CEFB, #B79EF0);
            opacity: 0.55;
            z-index: 1; /* Ensure circles stay in the background */
        }

        .purple {
            background: linear-gradient(to bottom, #CA9BFF, #5400A7, #39007A);
            opacity: 0.5;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .side-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .side-container .container {
            flex: 1;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            margin: 14px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(76, 18, 161, 0.12);
        }

        caption {
            caption-side: top;
            color: var(--navy);
            font-weight: 700;
            font-size: 13px;
            padding-bottom: 6px;
        }

        th, td {
            border: 1px solid var(--lavender);
            padding: 6px;
            text-align: center;
            width: 26px;
            height: 26px;
            font-weight: 600;
        }

        th {
            background-color: var(--purple);
            color: var(--white);
            border: none;
        }

        td {
            background-color: var(--white);
            color: var(--purple);
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        td:hover {
            background-color: var(--purple-light);
        }

        .highlight {
            background-color: var(--pink) !important;
            color: var(--white) !important;
        }
        .round-top-left {
            border-top-left-radius: 12px;
        }
        .round-top-right {
            border-top-right-radius: 12px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 10px 22px;
            min-width: 110px;
            height: auto;
            text-align: center;
            background-color: var(--pink);
            color: var(--white);
            font-family: inherit;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;

            background-color: var(--white);

        .scanner-control-btn svg {

        #scanner-container {

	<script type="text/javascript">
	
        var side = "A"; // Side of the bay
		var itemNumber = 0;

		var side = "";
		var itemNumber = "";

		function compareText() {
			var inputText = document.getElementById('inputText').value.trim().toUpperCase();

			function searchArray(dataArray, sideIdentifier) {
				var matches = [];
				for (var i = 0; i < dataArray.length; i++) {
					var line = dataArray[i].split(", ");
					// check full match
					if (line[2].toUpperCase() == inputText || line[1].toUpperCase() == inputText) {
						matches.push({
							side: sideIdentifier,
							itemNumber: line[0],
							dataArray: dataArray
						});
					} else { // check partial match
						if (line[2].toUpperCase().includes(inputText) || line[1].toUpperCase().includes(inputText)) {
							matches.push({
								side: sideIdentifier,
								itemNumber: line[0],
								dataArray: dataArray
							});
						}
					}
				}
				return matches;
			}

			removeHighlights(); // Clear highlights only once before the search

			// Collect matches from all arrays
			let allMatches = [];
			allMatches = allMatches.concat(searchArray(dataArray1, "A"));
			allMatches = allMatches.concat(searchArray(dataArray2, "B"));
			allMatches = allMatches.concat(searchArray(dataArray3, "C"));
			allMatches = allMatches.concat(searchArray(dataArray4, "D"));

			let displayBoxUpdated = false;

			if (allMatches.length > 0) {
				for (let match of allMatches) {
					searchValue(match.side, match.itemNumber); // Highlight each match

					if (!displayBoxUpdated) {
						const endText = lookupNumber(match.itemNumber, match.dataArray);
						document.getElementById('display-box').value = endText;
						displayBoxUpdated = true;
					}
				}
			} else {
				removeHighlights();
				showPopup();
			}
		}

		function lookupNumber(itemNumber, dataArray) {
			for (var i = 0; i < dataArray.length; i++) {
				var line = dataArray[i].split(", ");
				if (line[0] === itemNumber) {
					return line.join(", ");
				}
			}
			return '';
		}

		function searchValue(side, value) {
			let bays = {
				'A': {
					'Bay 1': document.getElementById('bay1_A').getElementsByTagName('td'),
					'Bay 2': document.getElementById('bay2_A').getElementsByTagName('td'),
					'Bay 3': document.getElementById('bay3_A').getElementsByTagName('td')
				},
				'B': {
					'Bay 1': document.getElementById('bay1_B').getElementsByTagName('td'),
					'Bay 2': document.getElementById('bay2_B').getElementsByTagName('td'),
					'Bay 3': document.getElementById('bay3_B').getElementsByTagName('td')
				},
				'C': {
					'Bay 1': document.getElementById('bay1_C').getElementsByTagName('td'),
					'Bay 2': document.getElementById('bay2_C').getElementsByTagName('td')
				},
				'D': {
					'Bay 1': document.getElementById('bay1_D').getElementsByTagName('td'),
					'Bay 2': document.getElementById('bay2_D').getElementsByTagName('td')
				}
			};

			// Highlight the matching value
			for (var bay in bays[side]) {
				if (bays[side].hasOwnProperty(bay)) {
					for (var k = 0; k < bays[side][bay].length; k++) {
						var cell = bays[side][bay][k];
						if (cell.textContent == value) {
							cell.classList.add('highlight'); // Add highlight class
						}
					}
				}
			}
		}

		function removeHighlights() {
			let bays = {
				'A': {
					'Bay 1': document.getElementById('bay1_A').getElementsByTagName('td'),
					'Bay 2': document.getElementById('bay2_A').getElementsByTagName('td'),
					'Bay 3': document.getElementById('bay3_A').getElementsByTagName('td')
				},
				'B': {
					'Bay 1': document.getElementById('bay1_B').getElementsByTagName('td'),
					'Bay 2': document.getElementById('bay2_B').getElementsByTagName('td'),
					'Bay 3': document.getElementById('bay3_B').getElementsByTagName('td')
				},
				'C': {
					'Bay 1': document.getElementById('bay1_C').getElementsByTagName('td'),
					'Bay 2': document.getElementById('bay2_C').getElementsByTagName('td')
				},
				'D': {
					'Bay 1': document.getElementById('bay1_D').getElementsByTagName('td'),
					'Bay 2': document.getElementById('bay2_D').getElementsByTagName('td')
				}
			};

			// Remove highlight from all bays
			var baysArray = ['A', 'B', 'C', 'D'];
			for (var i = 0; i < baysArray.length; i++) {
				var s = baysArray[i];
				for (var bay in bays[s]) {
					if (bays[s].hasOwnProperty(bay)) {
						for (var j = 0; j < bays[s][bay].length; j++) {
							var cell = bays[s][bay][j];
							cell.classList.remove('highlight');
						}
					}
				}
			}
		}

		
		function compareAndFind() {
			compareText();
		}
		
		function addToList() {
			const skuList = document.getElementById('skuList');
			const input = document.getElementById('inputText').value.trim().toUpperCase();

			skuList.value += input + '\n';

			// Auto-resize logic
			skuList.style.height = 'auto'; // reset height
			skuList.style.height = skuList.scrollHeight + 'px'; // adjust to new content
		}

		function copyToClipboard(){
		var inputValue = document.getElementById('code-box').value.trim().toUpperCase();

		if (navigator.clipboard && window.isSecureContext) {
			navigator.clipboard.writeText(inputValue)
			  .then(() => { console.log('Text copied to clipboard!'); })
			  .catch(err => { console.error('Failed to copy text: ', err); });
		} else {
			// Fallback for file:// or non-secure contexts
			var tempInput = document.createElement('input');
			tempInput.value = inputValue;
			document.body.appendChild(tempInput);
			tempInput.select();
			document.execCommand('copy');
			document.body.removeChild(tempInput);
		}
		}

    </script>
</head>

    <script>
	

		const toggleButton = document.getElementById("toggle-button");
		const scannerContainer = document.getElementById("scanner-container");
		const torchButton = document.getElementById("torch-button");
		const switchCameraButton = document.getElementById("switch-camera-button");
		const bayTables = document.getElementById("bay-tables");

		let isScanning = false; // Flag to keep track of the scanning state
		let html5QrCode; // Declare html5QrCode outside the event listener
		let cameraList = []; // Populated AFTER camera permission is granted
		let currentCameraIndex = 0;
		let torchOn = false;

		// IMPORTANT: html5-qrcode's `videoConstraints` config option, when present,
		// completely REPLACES the cameraIdOrConfig argument rather than merging with
		// it. That means facingMode/deviceId must live *inside* videoConstraints
		// itself, or the browser falls back to its own default camera (commonly the
		// front/selfie camera on phones). This helper builds a constraints object
		// that always carries the camera selection plus the continuous-focus hint.
		function buildConstraints(cameraSelector) {
			return Object.assign({ advanced: [{ focusMode: "continuous" }] }, cameraSelector);
		}

		// Enumerate cameras and rank them so a later "switch camera" tap avoids
		// ultra-wide / macro lenses, which focus poorly on barcodes up close.
		// Device labels are only populated by the browser AFTER camera permission
		// has been granted, so this must be called after a successful start().
		async function refreshCameraList() {
			try {
				const devices = await Html5Qrcode.getCameras();
				let backCameras = devices.filter(d => /back|rear/i.test(d.label));
				if (backCameras.length === 0) backCameras = devices;
				const standard = backCameras.filter(d => !/ultra|wide angle|tele/i.test(d.label));
				cameraList = standard.length > 0 ? standard : backCameras;
			} catch (err) {
				console.warn("Could not enumerate cameras:", err);
				cameraList = [];
			}
			switchCameraButton.disabled = cameraList.length <= 1;
		}

		// Decide whether to show the torch control as available. Some browsers
		// don't reliably report track capabilities even when torch does work, so
		// this stays optimistic (enabled) unless it can positively confirm torch
		// is unsupported. A failed applyVideoConstraints() call on click will
		// still disable it as a fallback (see the click handler below).
		function updateTorchAvailability() {
			torchOn = false;
			torchButton.classList.remove("active");
			try {
				const capabilities = html5QrCode.getRunningTrackCapabilities();
				if (capabilities && Object.prototype.hasOwnProperty.call(capabilities, "torch")) {
					torchButton.disabled = !capabilities.torch;
					return;
				}
			} catch (err) {
				// Capability probing isn't supported here — stay optimistic below.
			}
			torchButton.disabled = false;
		}

		function resetControlButtons() {
			torchOn = false;
			torchButton.disabled = true;
			torchButton.classList.remove("active");
			torchButton.title = "Toggle flashlight";
			switchCameraButton.disabled = true;
		}

		function hideBayTables() {
			bayTables.classList.add("hidden");
		}

		function showBayTables() {
			bayTables.classList.remove("hidden");
		}

		async function startScanning(cameraSelector) {
			scannerContainer.innerHTML = "";
			html5QrCode = new Html5Qrcode("scanner-container");
			const constraints = buildConstraints(cameraSelector);

			await html5QrCode.start(
				cameraSelector,
				{ fps: 5, qrbox: 300, videoConstraints: constraints },
				(decodedText) => {
					html5QrCode.stop();
					const foundEntry = EANList.find(item => item.startsWith(decodedText));
					inputText.value = foundEntry ? foundEntry.split(", ").pop() : "Unknown";
					toggleButton.textContent = "Start Scanner"; // Reset button text
					scannerContainer.style.border = '0px solid #4C12A1';
					isScanning = false;
					resetControlButtons();
					showBayTables();
					compareAndFind();
				},
				(errorMessage) => {
					console.warn(`Error: ${errorMessage}`);
				}
			);

			updateTorchAvailability();
		}

		toggleButton.addEventListener("click", async () => {
			if (!isScanning) {
				// Start scanning
				toggleButton.textContent = "Stop Scanner"; // Change button text
				scannerContainer.style.border = '2px solid #4C12A1';
				hideBayTables();

				try {
					// Always request the rear camera explicitly on first launch — device
					// labels (needed to pick a specific lens) aren't available until
					// after permission is granted, so facingMode is the reliable choice here.
					await startScanning({ facingMode: "environment" });
					isScanning = true; // Update flag to indicate scanning
					currentCameraIndex = 0;
					await refreshCameraList(); // Now that permission is granted, labels are populated
				} catch (err) {
					console.error(`Unable to start scanning: ${err}`);
					toggleButton.textContent = "Start Scanning";
					scannerContainer.style.border = '0px solid #4C12A1';
					showBayTables();
				}
			} else {
				// Stop scanning
				html5QrCode.stop();

function placeAllCircles() {
    const numberOfCircles = 4; // Number of circles to create
    const circles = []; // Array to store circle data
    const speedModifier = 0.1; // Configurable multiplier for all speeds (adjust for faster/slower motion)

    function createCircle(id) {
        const circle = document.createElement('div');
        const size = Math.random() * (400 - 100) + 100; // Random size between 100px and 600px
        let top = Math.random() * (window.innerHeight - size);
        let left = Math.random() * (window.innerWidth - size);

        // Velocity (random direction and speed)
        const dx = (Math.random() - 0.5) * speedModifier * 10; // Horizontal speed
        const dy = (Math.random() - 0.5) * speedModifier * 10; // Vertical speed

        circles.push({ circle, size, top, left, dx, dy }); // Store circle data

		// Use position: fixed to prevent layout shift
		circle.style.width = `${size}px`;
		circle.style.height = `${size}px`;
		circle.style.position = 'fixed';
		circle.style.borderRadius = '50%'; // Make the element look like a circle
		circle.style.top = `${top}px`;
		circle.style.left = `${left}px`;
		circle.classList.add('circle');
		document.body.appendChild(circle);


        return true;
    }

    function detectAndHandleCollisions() {
        for (let i = 0; i < circles.length; i++) {
            const circleA = circles[i];
            for (let j = i + 1; j < circles.length; j++) {
                const circleB = circles[j];

                // Calculate distance between two circles
                const dx = circleB.left + circleB.size / 2 - (circleA.left + circleA.size / 2);
                const dy = circleB.top + circleB.size / 2 - (circleA.top + circleA.size / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);

                // Check if circles overlap
                /*
				if (distance < (circleA.size / 2 + circleB.size / 2)) {
                    // Elastic collision response
                    const angle = Math.atan2(dy, dx);
                    const speedA = Math.sqrt(circleA.dx * circleA.dx + circleA.dy * circleA.dy);
                    const speedB = Math.sqrt(circleB.dx * circleB.dx + circleB.dy * circleB.dy);

                    const directionA = Math.atan2(circleA.dy, circleA.dx);
                    const directionB = Math.atan2(circleB.dy, circleB.dx);

                    circleA.dx = speedB * Math.cos(angle);
                    circleA.dy = speedB * Math.sin(angle);
                    circleB.dx = speedA * Math.cos(angle + Math.PI);
                    circleB.dy = speedA * Math.sin(angle + Math.PI);
                }
				*/
            }
        }
    }

    function updatePositions() {
        for (const data of circles) {
            const { circle, size, top, left, dx, dy } = data;

            // Update position based on velocity
            data.left += dx;
            data.top += dy;

            // Check for boundaries and bounce
            if (data.left <= 0 || data.left + size >= window.innerWidth) {
                data.dx = -data.dx; // Reverse horizontal direction
            }
            if (data.top <= 0 || data.top + size >= window.innerHeight) {
                data.dy = -data.dy; // Reverse vertical direction
            }

            // Apply updated positions
            circle.style.top = `${data.top}px`;
            circle.style.left = `${data.left}px`;
        }

        // Handle collisions
        detectAndHandleCollisions();
    }

    // Create all circles
    for (let i = 0; i < numberOfCircles; i++) {
        createCircle(i + 1);
    }

    // Update positions every 16 milliseconds (~60 frames per second)
    setInterval(updatePositions, 16);
}

// Run the placement process on DOMContentLoaded
document.addEventListener('DOMContentLoaded', () => {
    placeAllCircles();
});

function createTable(array, containerId, tableIdPrefix) {
    let container = document.getElementById(containerId);
    let cellMap = [];

    var tabWidth = 0;
    var tabHeight = 0;
    var sectionCount = 0;
    var tableCaption = "Test 123...";

    tableCaption = array[0].split(',')[0]; //.substring(0, 6) + '...';
    sectionCount = array[0].split(',')[1];
    tabWidth = array[0].split(',')[2];
    tabHeight = array[0].split(',')[3];

    for (let section = 0; section < sectionCount; section++) {
        let caption = section === 0 ? tableCaption : '&nbsp';
        let table = '<table id="bay' + (section + 1) + '_' + tableIdPrefix + '"><caption>' + caption + '</caption><tbody>';
        table += '<tr><th colspan="6" class="' + (section === 0 ? 'round-top-left' : (section === sectionCount - 1 ? 'round-top-right' : '')) + '">Bay ' + (section + 1) + '</th></tr>';
        let index = 1 + section * (tabWidth * tabHeight);

        for (let row = 0; row < tabHeight; row++) {
            table += '<tr>';
            for (let cell = 0; cell < tabWidth; cell++) {
                if (index < array.length) {
                    let cellId = tableIdPrefix + 'cell' + index;
                    let middleText = array[index].split(',')[1].trim();
                    table += '<td onclick="cellClick(\'' + cellId + '\', \'' + array[index] + '\')" id="' + cellId + '" title="' + array[index].split(',')[2].trim() + '">' + array[index].split(',')[0] + '</td>';
                    cellMap.push({ id: cellId, middleText: middleText });
                    index++;
                } else {
                    table += '<td></td>';
                }
            }
            table += '</tr>';
        }

        table += '</tbody></table>';
        container.innerHTML += table;
    }
    return cellMap;
}
